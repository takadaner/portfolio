<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <rect width="640" height="360" fill="#0d0d0d"/>
  <!-- chat panel -->
  <rect x="40" y="44" width="360" height="272" rx="16" fill="#161616" stroke="#222222" stroke-width="1.5"/>
  <!-- incoming bubble -->
  <rect x="64" y="72" width="200" height="54" rx="18" fill="#1f1f1f"/>
  <rect x="84" y="90" width="130" height="9" rx="4.5" fill="#2e2e2e"/>
  <rect x="84" y="106" width="90" height="9" rx="4.5" fill="#262626"/>
  <!-- outgoing bubble (bot, accent edge) -->
  <rect x="176" y="142" width="200" height="72" rx="18" fill="#222222"/>
  <rect x="176" y="142" width="5" height="72" rx="2.5" fill="#b9b1a4"/>
  <rect x="196" y="160" width="150" height="9" rx="4.5" fill="#3a3a3a"/>
  <rect x="196" y="178" width="120" height="9" rx="4.5" fill="#333333"/>
  <rect x="196" y="196" width="80" height="9" rx="4.5" fill="#2e2e2e"/>
  <!-- typing indicator -->
  <rect x="64" y="232" width="84" height="40" rx="18" fill="#1f1f1f"/>
  <circle cx="88" cy="252" r="5" fill="#3a3a3a"/>
  <circle cx="106" cy="252" r="5" fill="#2e2e2e"/>
  <circle cx="124" cy="252" r="5" fill="#262626"/>
  <!-- node graph -->
  <g stroke="#2a2a2a" stroke-width="1.5">
    <line x1="500" y1="96" x2="500" y2="180"/>
    <line x1="500" y1="180" x2="452" y2="244"/>
    <line x1="500" y1="180" x2="548" y2="244"/>
    <line x1="500" y1="96" x2="556" y2="140"/>
  </g>
  <circle cx="500" cy="96" r="14" fill="#1f1f1f" stroke="#b9b1a4" stroke-width="2"/>
  <circle cx="500" cy="180" r="11" fill="#262626" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="452" cy="244" r="11" fill="#1f1f1f" stroke="#333333" stroke-width="1.5"/>
  <circle cx="548" cy="244" r="11" fill="#1f1f1f" stroke="#333333" stroke-width="1.5"/>
  <circle cx="556" cy="140" r="9" fill="#1f1f1f" stroke="#2e2e2e" stroke-width="1.5"/>
</svg>
