  <circle cx="540" cy="266" r="34" fill="#1f1f1f"/>
  <rect x="592" y="246" width="110" height="16" rx="8" fill="#2e2e2e"/>
  <rect x="592" y="276" width="80" height="12" rx="6" fill="#262626"/>
